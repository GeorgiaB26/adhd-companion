<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7EB5A6"/>
      <stop offset="50%" style="stop-color:#5A9485"/>
      <stop offset="100%" style="stop-color:#9B8EC4"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8985E;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#F5C8A0;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="wing2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B8EC4;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#C5BBE0;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0"/>
      <stop offset="100%" style="stop-color:#FFF5EB"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)" stroke="#F0E0CC" stroke-width="2"/>

  <!-- Soft glow behind bird -->
  <ellipse cx="105" cy="95" rx="50" ry="45" fill="#E8985E" opacity="0.08"/>

  <!-- Back wing (larger, behind body) -->
  <path d="M95 82 C65 50, 30 42, 22 58 C16 70, 32 78, 50 76 C40 68, 55 55, 75 62 C60 56, 45 52, 38 62 C48 56, 62 60, 75 72 Z"
        fill="url(#wing2Grad)" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" values="-2 95 82;4 95 82;-2 95 82" dur="0.3s" repeatCount="indefinite"/>
  </path>

  <!-- Front wing (main, warm tones) -->
  <path d="M98 78 C72 44, 40 30, 28 48 C18 62, 38 72, 58 68 C46 58, 58 42, 80 52 C64 44, 50 38, 42 50 C54 42, 68 48, 82 64 Z"
        fill="url(#wingGrad)">
    <animateTransform attributeName="transform" type="rotate" values="3 98 78;-3 98 78;3 98 78" dur="0.25s" repeatCount="indefinite"/>
  </path>

  <!-- Body -->
  <ellipse cx="112" cy="95" rx="18" ry="30" transform="rotate(15 112 95)" fill="url(#bodyGrad)"/>

  <!-- Belly highlight -->
  <ellipse cx="108" cy="100" rx="10" ry="18" transform="rotate(15 108 100)" fill="#B5DDD1" opacity="0.5"/>

  <!-- Head -->
  <circle cx="108" cy="68" r="14" fill="url(#bodyGrad)"/>

  <!-- Eye -->
  <circle cx="113" cy="65" r="3.5" fill="#4A3728"/>
  <circle cx="114.5" cy="63.8" r="1.2" fill="white"/>

  <!-- Beak (long, thin, hummingbird-style) -->
  <path d="M121 67 L155 62 L122 70 Z" fill="#E8985E"/>
  <path d="M121 67 L155 62 L138 65" fill="none" stroke="#C47A3F" stroke-width="0.5"/>

  <!-- Tail feathers -->
  <path d="M100 120 C92 140, 85 155, 78 165 C82 158, 88 148, 96 132 C90 148, 86 158, 84 168 C88 160, 94 148, 102 128"
        fill="url(#bodyGrad)" opacity="0.8"/>

  <!-- Tiny feet -->
  <path d="M106 122 L102 132 M102 132 L98 134 M102 132 L105 135" stroke="#8B7355" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Small sparkles around the bird -->
  <g fill="#E8B44E" opacity="0.6">
    <path d="M150 45 L152 50 L154 45 L152 40 Z" transform="scale(0.8)"/>
    <path d="M55 110 L57 115 L59 110 L57 105 Z" transform="scale(0.6)"/>
    <circle cx="160" cy="90" r="2"/>
    <circle cx="48" cy="75" r="1.5"/>
    <circle cx="145" cy="130" r="1.5"/>
  </g>

  <!-- Heart accent -->
  <path d="M140 110 C140 106, 145 104, 147 107 C149 104, 154 106, 154 110 C154 115, 147 120, 147 120 C147 120, 140 115, 140 110 Z"
        fill="#D4736A" opacity="0.4"/>
</svg>
